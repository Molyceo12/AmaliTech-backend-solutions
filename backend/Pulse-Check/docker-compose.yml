version: '3.8'

services:
  redis:
    image: redis:alpine


  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/1
      - DEBUG=True
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A pulse_check worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
      - web
